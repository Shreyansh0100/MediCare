<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#0F4C81"/>
<stop offset="100%" stop-color="#14B8A6"/>
</linearGradient>
</defs>

<rect width="100%" height="100%" fill="white"/>

<!-- More medical icon -->
<g transform="translate(35,25) scale(2.1)">
  <!-- medical shield -->
  <path d="M65 10
           C95 20,120 25,120 25
           L120 80
           C120 120,95 145,65 160
           C35 145,10 120,10 80
           L10 25
           C10 25,35 20,65 10Z"
        fill="url(#g)"/>

  <!-- white cross -->
  <rect x="52" y="38" width="26" height="70" rx="6" fill="white"/>
  <rect x="30" y="60" width="70" height="26" rx="6" fill="white"/>

  <!-- stethoscope accent -->
  <path d="M118 50
           q25 10 10 35
           q-8 15 -28 8"
        fill="none"
        stroke="#14B8A6"
        stroke-width="8"
        stroke-linecap="round"/>

  <circle cx="95" cy="95" r="10" fill="#14B8A6"/>
</g>

<!-- Bigger text -->
<text x="360" y="150"
      font-family="Arial, Helvetica, sans-serif"
      font-size="120"
      font-weight="800"
      fill="url(#g)">Healora</text>

<text x="365" y="220"
      font-family="Arial, Helvetica, sans-serif"
      font-size="34"
      letter-spacing="4"
      fill="#4B5563">SMART HEALTHCARE • TRUSTED CARE</text>

</svg>